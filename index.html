    <div class="score"></div>
     <div class="button"></div>
     <div class="upgrade"></div>

    <style>
        


        .button{
            display: flex;
            justify-content: center;
            height: 100px;
            gap: 50px;
        }
     
        p{
            text-align: center;
            font-size: 10rem;
        }

        .upgrade{
            margin: 50px;
        }

        #plus{
            
            width: 11rem;
            height: 4rem;
            border-radius: 10px;
            
            border-color: black;
            color: black;
        }

        #plus:hover{
            transition: all 0.1s ease-out;
            width: 12rem;
            height: 5rem;
        }

        #ajust{
            background: red;
            width: 10rem;
            height: 3rem;
            color: aliceblue;
            border: 0;
            border-radius: 50px;
        }

        #ajust:hover{
            transition: all 0.1s ease-out;
            width: 11rem;
            height: 4rem;
        }

    </style>


    <script>
        
        const div = document.querySelector('.score')
        const body = document.querySelector('.button')
        const upgrade = document.querySelector('.upgrade')

        const button1 = document.createElement('button')
        button1.innerText = 'claque moi dessus'
        button1.id ="ajust"

        const button = document.createElement('button')
        button.innerText = 'click moi dessus'
        button.id ="ajust"
        
        const evolv = document.createElement('button')
        evolv.innerText = '+2'
        evolv.id ="plus"



        const scoreElement = document.createElement('p')
        let score = 0
        scoreElement.innerText = `${score}`
       
        
            button.addEventListener('click', (a)=>{
                score++
                scoreElement.innerText = `${score}`
            })
               
            button1.addEventListener('click', ()=>{
                score--
                scoreElement.innerText = `${score}`
            })
        
            evolv.addEventListener('click', ()=> {
                evolv.style.background = 'green'
                evolv.style.color ='white'
                evolv.style.border ='none'
                button.addEventListener('click', (a)=>{
                    score+=1
                    scoreElement.innerText = `${score}`
                })
            })

       

     div.append(scoreElement)
     body.append(button1, button)
     upgrade.append(evolv)
